<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="زاد المسلم">
<meta name="description" content="قرآن كريم · أذكار · مواقيت الصلاة · أحاديث شريفة">
<title>زاد المسلم</title>
<link rel="manifest" href="zad-manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#0d1a12;--g2:#162010;--g3:#1e2d1a;--g4:#243322;
  --p:#2d5a3d;--pl:#3d7a55;--pd:#1a3a2a;
  --a:#c9a84c;--al:#f0c060;--ad:#a07832;
  --t:#f0f4f0;--ts:#9ab89a;--td:#6a926a;
  --b:rgba(45,90,61,.35);
  --r:14px;--rs:10px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --glass:rgba(14,26,18,.88)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--g1);color:var(--t);font-family:'Cairo',sans-serif}
body{
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  height:100dvh;overflow:hidden;
  background:var(--g1)
}

/* ── Header ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--st) + 10px) 14px 10px;
  background:linear-gradient(180deg,var(--pd) 0%,transparent 100%);
  position:relative;z-index:20
}
.hdr-logo{display:flex;flex-direction:column;align-items:center}
.hdr-title{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--al);text-shadow:0 0 20px rgba(201,168,76,.3)}
.hdr-sub{font-size:10px;color:var(--td);margin-top:-2px}
.hdr-btn{
  background:rgba(45,90,61,.25);border:1px solid var(--b);
  border-radius:50%;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--a);font-size:18px;transition:.2s
}
.hdr-btn:active{background:rgba(45,90,61,.5)}

/* ── Main scroll ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:2px}
.scroll::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

/* ── Sections ── */
.sec{display:none;padding-bottom:110px}
.sec.on{display:block}

/* ── Bottom nav ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--b);
  padding:6px 0 calc(var(--sb) + 6px);
  display:flex;z-index:100
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 2px;cursor:pointer;border:none;background:none;
  color:var(--td);font-family:'Cairo',sans-serif;font-size:10.5px;
  transition:color .2s;position:relative
}
.ni.on{color:var(--al)}
.ni.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:2px;background:var(--al);border-radius:0 0 3px 3px
}
.ni-ico{font-size:20px;line-height:1}

/* ── Install banner ── */
.install{
  display:none;margin:0 14px 10px;
  background:linear-gradient(135deg,var(--p),var(--pd));
  border-radius:var(--rs);padding:10px 14px;
  align-items:center;gap:10px;border:1px solid var(--pl)
}
.install.on{display:flex}
.install-txt{flex:1;font-size:12px;color:var(--t);line-height:1.4}
.install-btn{
  padding:6px 14px;background:var(--a);color:#0d1a12;
  border:none;border-radius:20px;font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--g4);color:var(--t);padding:9px 18px;
  border-radius:20px;font-size:13px;opacity:0;pointer-events:none;
  transition:.3s;z-index:999;border:1px solid var(--b);white-space:nowrap
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   QURAN
══════════════════════════════════════ */
.q-hero{
  padding:18px 14px 14px;
  background:linear-gradient(160deg,var(--pd) 0%,#0a1e10 60%,var(--g1) 100%);
  position:relative;overflow:hidden
}
.q-hero::before{
  content:'';position:absolute;top:-40px;left:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 70%)
}
.bismillah{
  text-align:center;font-family:'Amiri',serif;font-size:26px;
  color:var(--al);margin-bottom:14px;
  text-shadow:0 0 24px rgba(201,168,76,.25)
}
.q-now{
  background:rgba(22,32,16,.75);backdrop-filter:blur(10px);
  border:1px solid var(--b);border-radius:var(--r);
  padding:14px 16px;text-align:center;margin-bottom:12px
}
.q-now-num{font-size:11px;color:var(--td);margin-bottom:2px}
.q-now-name{font-family:'Amiri',serif;font-size:30px;color:var(--al);font-weight:700}
.q-now-meta{font-size:11px;color:var(--ts);margin-top:2px}

/* Reciter chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:5px 13px;border-radius:20px;
  border:1px solid var(--b);background:var(--g3);
  color:var(--ts);font-family:'Cairo',sans-serif;font-size:12px;
  cursor:pointer;transition:.2s;white-space:nowrap
}
.chip.on{background:var(--p);border-color:var(--pl);color:var(--al)}

/* Player */
.player{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:6px 14px;margin-bottom:8px
}
.pbtn{
  background:none;border:none;color:var(--ts);
  font-size:22px;cursor:pointer;padding:7px;
  border-radius:50%;transition:.15s;display:flex;align-items:center
}
.pbtn:active{transform:scale(.88)}
.pbtn.main{
  background:var(--p);color:var(--al);font-size:26px;
  width:60px;height:60px;border-radius:50%;
  box-shadow:0 4px 18px rgba(45,90,61,.5);border:1px solid var(--pl)
}
.pbtn.main.playing{box-shadow:0 4px 24px rgba(201,168,76,.3);border-color:var(--a)}
.pbtn.sm{font-size:17px;color:var(--td)}

/* Progress */
.prog{padding:2px 14px 12px}
.prog-bg{height:3px;background:var(--g4);border-radius:3px;cursor:pointer;position:relative}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--pl),var(--a));
  border-radius:3px;width:0%;transition:width .5s linear;position:relative
}
.prog-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;background:var(--al);border-radius:50%;
  box-shadow:0 0 6px rgba(201,168,76,.5)
}
.prog-times{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--td)}

/* Surah list */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 6px
}
.sec-lbl{font-size:13px;font-weight:600;color:var(--a)}
.search-box{
  flex:1;margin-right:10px;padding:5px 10px;
  background:var(--g3);border:1px solid var(--b);border-radius:20px;
  color:var(--t);font-family:'Cairo',sans-serif;font-size:12px;
  outline:none;direction:rtl
}
.search-box::placeholder{color:var(--td)}

.slist{padding:0 14px;display:flex;flex-direction:column;gap:5px}
.si{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--g2);border-radius:var(--rs);border:1px solid transparent;
  cursor:pointer;transition:.15s
}
.si:active{transform:scale(.99)}
.si.on{background:var(--g3);border-color:var(--p)}
.si-num{
  width:34px;height:34px;background:var(--g3);border:1px solid var(--b);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--a);font-weight:700;flex-shrink:0
}
.si.on .si-num{background:var(--p);border-color:var(--pl)}
.si-info{flex:1;min-width:0}
.si-name{font-family:'Amiri',serif;font-size:18px;color:var(--t);font-weight:700}
.si.on .si-name{color:var(--al)}
.si-det{font-size:10px;color:var(--ts);margin-top:1px}
.si-type{
  font-size:10px;padding:2px 7px;border-radius:20px;
  background:var(--g4);color:var(--td)
}

/* ══════════════════════════════════════
   AZKAR
══════════════════════════════════════ */
.az-tabs{display:flex;padding:14px;gap:0}
.az-tab{
  flex:1;padding:8px 4px;text-align:center;
  font-family:'Cairo',sans-serif;font-size:12px;
  border:1px solid var(--b);background:var(--g2);
  color:var(--ts);cursor:pointer;transition:.2s
}
.az-tab:first-child{border-radius:8px 0 0 8px}
.az-tab:last-child{border-radius:0 8px 8px 0}
.az-tab:not(:first-child){border-right:none}
.az-tab.on{background:var(--p);color:var(--al);border-color:var(--pl)}

.az-prog-wrap{padding:0 14px 12px}
.az-prog-bg{height:3px;background:var(--g4);border-radius:3px}
.az-prog-fill{
  height:100%;background:linear-gradient(90deg,var(--pl),var(--a));
  border-radius:3px;transition:width .3s
}

.zk-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px 8px
}
.zk-nav-btn{
  background:var(--g3);border:1px solid var(--b);border-radius:8px;
  padding:7px 14px;color:var(--ts);font-family:'Cairo',sans-serif;
  font-size:12px;cursor:pointer;transition:.15s
}
.zk-nav-btn:active{background:var(--p);color:var(--al)}
.zk-nav-btn:disabled{opacity:.3;pointer-events:none}
.zk-idx{font-size:12px;color:var(--td)}

.zk-card{
  margin:0 14px 12px;background:var(--g2);border:1px solid var(--b);
  border-radius:var(--r);padding:18px;text-align:center
}
.zk-txt{
  font-family:'Amiri',serif;font-size:21px;line-height:1.85;
  color:var(--t);margin-bottom:10px
}
.zk-src{font-size:11px;color:var(--td);margin-bottom:14px;font-style:italic}
.zk-count-row{
  display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px
}
.zk-count{font-size:28px;font-weight:700;color:var(--al);min-width:56px;text-align:center}
.zk-tap{
  padding:10px 28px;background:var(--p);color:var(--al);
  border:none;border-radius:var(--rs);font-family:'Cairo',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;transition:.12s
}
.zk-tap:active{transform:scale(.93);background:var(--pl)}
.zk-reset{
  padding:6px 14px;background:transparent;color:var(--ts);
  border:1px solid var(--b);border-radius:20px;
  font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer
}
.zk-done{
  display:none;background:var(--p);color:var(--al);
  text-align:center;padding:10px;border-radius:8px;
  font-size:14px;font-weight:600;margin-top:8px
}
.zk-done.on{display:block}

/* ══════════════════════════════════════
   PRAYER
══════════════════════════════════════ */
.pr-hero{
  margin:14px 14px 10px;
  background:linear-gradient(135deg,var(--pd),#0b1f12);
  border-radius:var(--r);padding:18px;text-align:center;
  border:1px solid var(--pl);position:relative;overflow:hidden
}
.pr-hero::after{
  content:'🕌';position:absolute;left:14px;top:50%;
  transform:translateY(-50%);font-size:38px;opacity:.12
}
.pr-lbl{font-size:11px;color:var(--td);margin-bottom:3px}
.pr-name{font-family:'Amiri',serif;font-size:28px;font-weight:700;color:var(--al);margin-bottom:3px}
.pr-cd{font-size:20px;color:var(--t);font-weight:600;font-variant-numeric:tabular-nums}

.pr-grid{margin:0 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pt{
  background:var(--g2);border:1px solid var(--b);border-radius:var(--rs);
  padding:12px 14px;transition:border-color .3s
}
.pt.cur{border-color:var(--a);background:var(--g3)}
.pt-name{font-family:'Amiri',serif;font-size:17px;color:var(--ts)}
.pt.cur .pt-name{color:var(--al)}
.pt-time{font-size:20px;font-weight:700;color:var(--t);font-variant-numeric:tabular-nums;margin-top:2px}
.pt.cur .pt-time{color:var(--al)}

.pr-loc{text-align:center;padding:6px 14px 0;font-size:11px;color:var(--td)}
.loc-btn{
  background:none;border:1px solid var(--b);border-radius:20px;
  padding:6px 14px;color:var(--ts);font-family:'Cairo',sans-serif;
  font-size:12px;cursor:pointer;margin-top:8px;display:block;margin:8px auto 0
}

/* ══════════════════════════════════════
   HADITH
══════════════════════════════════════ */
.hd-card{
  margin:14px;background:var(--g2);border:1px solid var(--b);
  border-radius:var(--r);overflow:hidden
}
.hd-hdr{
  background:linear-gradient(135deg,var(--pd),#091a0d);
  padding:12px 14px;display:flex;align-items:center;gap:8px
}
.hd-ico{font-size:18px}
.hd-ttl{font-family:'Amiri',serif;font-size:15px;color:var(--al)}
.hd-body{padding:18px}
.hd-txt{
  font-family:'Amiri',serif;font-size:19px;line-height:1.95;
  color:var(--t);margin-bottom:14px
}
.hd-meta{
  background:var(--g3);border-radius:8px;padding:10px 12px;margin-bottom:10px
}
.hd-chain{font-size:11px;color:var(--td)}
.hd-narrator{font-family:'Amiri',serif;font-size:14px;color:var(--a);margin-top:2px}
.hd-src{font-size:11px;color:var(--td);text-align:center}
.hd-btn{
  width:100%;padding:12px;background:var(--p);color:var(--al);
  border:none;border-top:1px solid var(--b);
  font-family:'Cairo',sans-serif;font-size:14px;cursor:pointer;transition:.2s
}
.hd-btn:active{background:var(--pl)}

.ornament{
  text-align:center;font-size:13px;color:var(--a);
  opacity:.4;letter-spacing:7px;padding:6px 0
}
.loader{text-align:center;padding:32px;color:var(--td);font-size:13px}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <button class="hdr-btn" id="settingsBtn" title="إعدادات">⚙️</button>
  <div class="hdr-logo">
    <span class="hdr-title">زاد المسلم</span>
    <span class="hdr-sub">بسم الله الرحمن الرحيم</span>
  </div>
  <button class="hdr-btn" id="shareBtn" title="مشاركة">🔗</button>
</header>

<!-- Scroll container -->
<div class="scroll">

  <!-- Install banner -->
  <div class="install" id="installBanner">
    <span class="install-txt">ثبّت التطبيق على شاشتك الرئيسية للوصول بدون إنترنت</span>
    <button class="install-btn" id="installBtn">تثبيت</button>
  </div>

  <!-- ═══════════ QURAN ═══════════ -->
  <section class="sec on" id="sec-quran">
    <div class="q-hero">
      <div class="bismillah">﷽</div>
      <div class="q-now">
        <div class="q-now-num" id="q-num">سورة ١</div>
        <div class="q-now-name" id="q-name">الفاتحة</div>
        <div class="q-now-meta" id="q-meta">٧ آيات · مكية</div>
      </div>
    </div>

    <!-- Reciters -->
    <div class="chips" id="reciters">
      <button class="chip on" data-id="afs">مشاري العفاسي</button>
      <button class="chip" data-id="minsh">محمد المنشاوي</button>
      <button class="chip" data-id="husr">محمود خليل الحصري</button>
      <button class="chip" data-id="basit">عبد الباسط</button>
      <button class="chip" data-id="ghamdi">سعد الغامدي</button>
    </div>

    <!-- Controls -->
    <div class="player">
      <button class="pbtn sm" id="q-prev" title="السورة السابقة">⏮</button>
      <button class="pbtn sm" id="q-back" title="ترجع ١٠ث">⏪</button>
      <button class="pbtn main" id="q-play">▶</button>
      <button class="pbtn sm" id="q-fwd" title="تقدم ١٠ث">⏩</button>
      <button class="pbtn sm" id="q-next" title="السورة التالية">⏭</button>
    </div>

    <!-- Progress -->
    <div class="prog">
      <div class="prog-bg" id="q-prog-bg">
        <div class="prog-fill" id="q-prog-fill"></div>
      </div>
      <div class="prog-times">
        <span id="q-cur">٠:٠٠</span>
        <span id="q-dur">٠:٠٠</span>
      </div>
    </div>

    <div class="ornament">❧ ✦ ❧</div>

    <!-- Surah search + list -->
    <div class="sec-hdr">
      <input class="search-box" id="q-search" type="search" placeholder="ابحث عن سورة..." autocomplete="off">
      <span class="sec-lbl">السور</span>
    </div>
    <div class="slist" id="slist"></div>
  </section>

  <!-- ═══════════ AZKAR ═══════════ -->
  <section class="sec" id="sec-azkar">
    <div class="ornament" style="padding:14px 0 0">❧ الأذكار ❧</div>

    <!-- Category tabs -->
    <div class="az-tabs">
      <button class="az-tab on" data-cat="morning">الصباح</button>
      <button class="az-tab" data-cat="evening">المساء</button>
      <button class="az-tab" data-cat="prayer">بعد الصلاة</button>
      <button class="az-tab" data-cat="sleep">النوم</button>
    </div>

    <!-- Progress -->
    <div class="az-prog-wrap">
      <div class="az-prog-bg"><div class="az-prog-fill" id="az-prog"></div></div>
    </div>

    <!-- Navigation -->
    <div class="zk-nav">
      <button class="zk-nav-btn" id="az-prev">السابق ←</button>
      <span class="zk-idx" id="az-idx">١ / ١</span>
      <button class="zk-nav-btn" id="az-next">→ التالي</button>
    </div>

    <!-- Zikr card -->
    <div class="zk-card">
      <div class="zk-txt" id="az-txt"></div>
      <div class="zk-src" id="az-src"></div>
      <div class="zk-count-row">
        <button class="zk-reset" id="az-reset">إعادة</button>
        <div class="zk-count" id="az-count">٣</div>
        <button class="zk-tap" id="az-tap">سبّح</button>
      </div>
      <div class="zk-done" id="az-done">✓ تمّ بحمد الله</div>
    </div>
  </section>

  <!-- ═══════════ PRAYER ═══════════ -->
  <section class="sec" id="sec-prayer">
    <div class="pr-hero">
      <div class="pr-lbl">الصلاة القادمة</div>
      <div class="pr-name" id="pr-next-name">——</div>
      <div class="pr-cd" id="pr-countdown">——</div>
    </div>

    <div class="pr-grid" id="pr-grid">
      <div class="loader">⏳ جاري تحميل مواقيت الصلاة…</div>
    </div>

    <div class="pr-loc" id="pr-loc">
      <button class="loc-btn" id="loc-btn">📍 تحديد موقعي</button>
    </div>
  </section>

  <!-- ═══════════ HADITH ═══════════ -->
  <section class="sec" id="sec-hadith">
    <div class="ornament" style="padding:14px 0 4px">❧ من الأحاديث الشريفة ❧</div>
    <div class="hd-card">
      <div class="hd-hdr"><span class="hd-ico">📖</span><span class="hd-ttl">حديث اليوم</span></div>
      <div class="hd-body">
        <div class="hd-txt" id="hd-txt"></div>
        <div class="hd-meta">
          <div class="hd-chain">رواه</div>
          <div class="hd-narrator" id="hd-narrator"></div>
        </div>
        <div class="hd-src" id="hd-src"></div>
      </div>
      <button class="hd-btn" id="hd-next">🔄 حديث آخر</button>
    </div>
    <div class="ornament">❧ ✦ ❧</div>
  </section>

</div><!-- /scroll -->

<!-- Bottom nav -->
<nav class="bnav">
  <button class="ni on" data-sec="quran"><span class="ni-ico">📖</span>القرآن</button>
  <button class="ni" data-sec="azkar"><span class="ni-ico">📿</span>الأذكار</button>
  <button class="ni" data-sec="prayer"><span class="ni-ico">🕌</span>الصلاة</button>
  <button class="ni" data-sec="hadith"><span class="ni-ico">🌙</span>الحديث</button>

  {t:'طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ.',n:'أنس بن مالك رضي الله عنه',s:'رواه ابن ماجه'},
  {t:'الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ.',n:'عبد الله بن عمرو رضي الله عنه',s:'متفق عليه'},
  {t:'خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ.',n:'عثمان بن عفان رضي الله عنه',s:'رواه البخاري'},
  {t:'أَفْضَلُ الصِّيَامِ بَعْدَ رَمَضَانَ شَهْرُ اللَّهِ الْمُحَرَّمُ، وَأَفْضَلُ الصَّلَاةِ بَعْدَ الْفَرِيضَةِ صَلَاةُ اللَّيْلِ.',n:'أبو هريرة رضي الله عنه',s:'رواه مسلم'},
  {t:'تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ صَدَقَةٌ.',n:'أبو ذر الغفاري رضي الله عنه',s:'رواه الترمذي'},
  {t:'الْكَلِمَةُ الطَّيِّبَةُ صَدَقَةٌ.',n:'أبو هريرة رضي الله عنه',s:'متفق عليه'},
  {t:'مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ.',n:'أبو هريرة رضي الله عنه',s:'رواه مسلم'},
  {t:'الصِّدْقُ يَهْدِي إِلَى الْبِرِّ، وَإِنَّ الْبِرَّ يَهْدِي إِلَى الْجَنَّةِ.',n:'عبد الله بن مسعود رضي الله عنه',s:'متفق عليه'},
  {t:'خَيْرُ النَّاسِ أَنْفَعُهُمْ لِلنَّاسِ.',n:'جابر بن عبد الله رضي الله عنه',s:'رواه الطبراني'}
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
const state = {
  tab: 'quran',
  surahIdx: 0,
  reciter: 'afs',
  playing: false,
  // Azkar
  azCat: 'morning',
  azIdx: 0,
  azCounters: {},
  // Prayer
  prayerTimes: null,
  prayerCity: '',
  // Hadith
  hdIdx: Math.floor(Math.random() * HADITH.length)
};

const audio = document.getElementById('audio');

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
document.querySelectorAll('.ni').forEach(btn => {
  btn.addEventListener('click', () => {
    const sec = btn.dataset.sec;
    document.querySelectorAll('.ni').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('sec-' + sec).classList.add('on');
    state.tab = sec;
    if (sec === 'prayer' && !state.prayerTimes) initPrayer();
  });
});

/* Handle hash navigation from manifest shortcuts */
if (location.hash) {
  const h = location.hash.replace('#','');
  const ni = document.querySelector(`.ni[data-sec="${h}"]`);
  if (ni) ni.click();
}

/* ══════════════════════════════════════
   QURAN PLAYER
══════════════════════════════════════ */
function pad3(n){ return String(n).padStart(3,'0'); }

function buildSurahList(filter=''){
  const list = document.getElementById('slist');
  list.innerHTML = '';
  const q = filter.trim().toLowerCase();
  SURAHS.forEach(([name, ayahs, type], i) => {
    if (q && !name.includes(q) && !String(i+1).includes(q)) return;
    const d = document.createElement('div');
    d.className = 'si' + (i === state.surahIdx ? ' on' : '');
    d.innerHTML = `
      <div class="si-num">${i+1}</div>
      <div class="si-info">
        <div class="si-name">${name}</div>
        <div class="si-det">${ayahs} آية</div>
      </div>
      <span class="si-type">${type}</span>`;
    d.addEventListener('click', () => loadSurah(i));
    list.appendChild(d);
  });
}

function loadSurah(idx){
  state.surahIdx = idx;
  const [name, ayahs, type] = SURAHS[idx];
  document.getElementById('q-num').textContent = `سورة ${idx+1}`;
  document.getElementById('q-name').textContent = name;
  document.getElementById('q-meta').textContent = `${ayahs} آيات · ${type}`;
  const url = RECITERS[state.reciter] + pad3(idx+1) + '.mp3';
  audio.src = url;
  audio.load();
  setPlaying(true);
  buildSurahList(document.getElementById('q-search').value);
  updateMediaSession(name);
  // Scroll to top of list
  document.getElementById('slist').querySelector('.si.on')?.scrollIntoView({block:'nearest'});
}

function setPlaying(val){
  state.playing = val;
  const btn = document.getElementById('q-play');
  btn.textContent = val ? '⏸' : '▶';
  btn.classList.toggle('playing', val);
  if (val) { audio.play().catch(()=>{}); startKeepalive(); }
  else audio.pause();
  updateMediaPlayback();
}

document.getElementById('q-play').addEventListener('click', () => setPlaying(!state.playing));
document.getElementById('q-prev').addEventListener('click', () => {
  if (state.surahIdx > 0) loadSurah(state.surahIdx - 1);
});
document.getElementById('q-next').addEventListener('click', () => {
  if (state.surahIdx < 113) loadSurah(state.surahIdx + 1);
});
document.getElementById('q-back').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
document.getElementById('q-fwd').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });

/* Progress */
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('q-prog-fill').style.width = pct + '%';
  document.getElementById('q-cur').textContent = fmt(audio.currentTime);
  document.getElementById('q-dur').textContent = fmt(audio.duration);
  updateMediaPosition();
});
audio.addEventListener('ended', () => {
  if (state.surahIdx < 113) loadSurah(state.surahIdx + 1);
  else setPlaying(false);
});
audio.addEventListener('play', () => setPlaying(true));
audio.addEventListener('pause', () => { state.playing = false; document.getElementById('q-play').textContent='▶'; });
audio.addEventListener('error', () => toast('خطأ في التشغيل، جرّب قارئاً آخر'));

document.getElementById('q-prog-bg').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((rect.right - e.clientX) / rect.width) * audio.duration;
});

/* Reciters */
document.getElementById('reciters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  state.reciter = chip.dataset.id;
  const wasPlaying = state.playing;
  loadSurah(state.surahIdx);
  if (!wasPlaying) setPlaying(false);
});

/* Search */
document.getElementById('q-search').addEventListener('input', e => buildSurahList(e.target.value));

function fmt(s){
  s = Math.floor(s||0);
  const m = Math.floor(s/60), ss = s%60;
  return `${m}:${String(ss).padStart(2,'0')}`;
}

/* ══════════════════════════════════════
   BACKGROUND PLAYBACK & MEDIA SESSION
══════════════════════════════════════ */
let _kCtx, _kOsc, _kGain;

function startKeepalive(){
  if (_kCtx) return;
  try {
    _kCtx = new (window.AudioContext || window.webkitAudioContext)();
    _kOsc = _kCtx.createOscillator();
    _kGain = _kCtx.createGain();
    _kGain.gain.value = 0.001;
    _kOsc.connect(_kGain);
    _kGain.connect(_kCtx.destination);
    _kOsc.start();
  } catch(e){}
}

function updateMediaSession(surahName){
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: surahName || SURAHS[state.surahIdx][0],
    artist: document.querySelector('.chip.on')?.textContent || 'قارئ',
    album: 'القرآن الكريم'
  });
  navigator.mediaSession.setActionHandler('play', () => setPlaying(true));
  navigator.mediaSession.setActionHandler('pause', () => setPlaying(false));
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    if (state.surahIdx > 0) loadSurah(state.surahIdx - 1);
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    if (state.surahIdx < 113) loadSurah(state.surahIdx + 1);
  });
  navigator.mediaSession.setActionHandler('seekbackward', d => {
    audio.currentTime = Math.max(0, audio.currentTime - (d.seekOffset||10));
  });
  navigator.mediaSession.setActionHandler('seekforward', d => {
    audio.currentTime = Math.min(audio.duration||0, audio.currentTime + (d.seekOffset||10));
  });
}

function updateMediaPlayback(){
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = state.playing ? 'playing' : 'paused';
}

function updateMediaPosition(){
  if (!('mediaSession' in navigator) || !audio.duration) return;
  try {
    navigator.mediaSession.setPositionState({
      duration: audio.duration,
      playbackRate: 1,
      position: audio.currentTime
    });
  } catch(e){}
}

/* ══════════════════════════════════════
   AZKAR
══════════════════════════════════════ */
function getAzkarList(){ return AZKAR[state.azCat]; }

function azUpdate(){
  const list = getAzkarList();
  const z = list[state.azIdx];
  const key = state.azCat + '_' + state.azIdx;
  if (!(key in state.azCounters)) state.azCounters[key] = z.c;

  document.getElementById('az-txt').textContent = z.t;
  document.getElementById('az-src').textContent = z.s;

  const remaining = state.azCounters[key];
  document.getElementById('az-count').textContent = toArabicNum(remaining);
  document.getElementById('az-done').classList.toggle('on', remaining === 0);
  document.getElementById('az-tap').disabled = remaining === 0;

  const total = list.length;
  document.getElementById('az-idx').textContent = `${toArabicNum(state.azIdx+1)} / ${toArabicNum(total)}`;
  document.getElementById('az-prog').style.width = ((state.azIdx+1)/total*100) + '%';
  document.getElementById('az-prev').disabled = state.azIdx === 0;
  document.getElementById('az-next').disabled = state.azIdx === total-1;
  document.getElementById('az-tap').textContent = z.c > 1 ? 'سبّح' : 'تأكيد';
}

document.querySelectorAll('.az-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.az-tab').forEach(b => b.classList.remove('on'));
    t.classList.add('on');
    state.azCat = t.dataset.cat;
    state.azIdx = 0;
    azUpdate();
  });
});

document.getElementById('az-next').addEventListener('click', () => {
  if (state.azIdx < getAzkarList().length - 1){ state.azIdx++; azUpdate(); }
});
document.getElementById('az-prev').addEventListener('click', () => {
  if (state.azIdx > 0){ state.azIdx--; azUpdate(); }
});

document.getElementById('az-tap').addEventListener('click', () => {
  const key = state.azCat + '_' + state.azIdx;
  if (state.azCounters[key] > 0){
    state.azCounters[key]--;
    document.getElementById('az-count').textContent = toArabicNum(state.azCounters[key]);
    if (state.azCounters[key] === 0){
      document.getElementById('az-done').classList.add('on');
      document.getElementById('az-tap').disabled = true;
      if (navigator.vibrate) navigator.vibrate([30, 10, 30]);
    }
  }
});

document.getElementById('az-reset').addEventListener('click', () => {
  const key = state.azCat + '_' + state.azIdx;
  state.azCounters[key] = getAzkarList()[state.azIdx].c;
  document.getElementById('az-done').classList.remove('on');
  document.getElementById('az-tap').disabled = false;
  azUpdate();
});

function toArabicNum(n){
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

/* ══════════════════════════════════════
   PRAYER TIMES
══════════════════════════════════════ */
const PRAYERS_AR = {Fajr:'الفجر',Sunrise:'الشروق',Dhuhr:'الظهر',Asr:'العصر',Maghrib:'المغرب',Isha:'العشاء'};
const PRAYERS_ORDER = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];

function initPrayer(){
  if (!navigator.geolocation){
    fetchPrayersByCity('Cairo','Egypt');
    return;
  }
  document.getElementById('loc-btn').addEventListener('click', () => {
    navigator.geolocation.getCurrentPosition(
      pos => fetchPrayersByCoords(pos.coords.latitude, pos.coords.longitude),
      () => fetchPrayersByCity('Cairo','Egypt')
    );
  });
  fetchPrayersByCity('Cairo','Egypt'); // default
}

async function fetchPrayersByCoords(lat, lng){
  try {
    const ts = Math.floor(Date.now()/1000);
    const r = await fetch(`https://api.aladhan.com/v1/timings/${ts}?latitude=${lat}&longitude=${lng}&method=4`);
    const j = await r.json();
    renderPrayers(j.data.timings, 'موقعك الحالي');
  } catch(e){ toast('تعذّر تحميل مواقيت الصلاة'); }
}

async function fetchPrayersByCity(city, country){
  try {
    const r = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=4`);
    const j = await r.json();
    renderPrayers(j.data.timings, city);
  } catch(e){ document.getElementById('pr-grid').innerHTML = '<div class="loader">تعذّر التحميل</div>'; }
}

function renderPrayers(timings, city){
  state.prayerTimes = timings;
  state.prayerCity = city;

  const grid = document.getElementById('pr-grid');
  grid.innerHTML = '';
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  let nextName = '', nextMin = Infinity;

  PRAYERS_ORDER.forEach(key => {
    if (!timings[key]) return;
    const [h,m] = timings[key].split(':').map(Number);
    const pMin = h*60+m;
    if (pMin > nowMin && pMin < nextMin){ nextMin = pMin; nextName = key; }
    const card = document.createElement('div');
    card.className = 'pt';
    card.id = 'pt-' + key;
    card.innerHTML = `<div class="pt-name">${PRAYERS_AR[key]||key}</div><div class="pt-time">${formatTime12(h,m)}</div>`;
    grid.appendChild(card);
  });

  // If no next prayer today, wrap to Fajr
  if (!nextName) nextName = 'Fajr';

  document.getElementById('pt-' + nextName)?.classList.add('cur');
  document.getElementById('pr-next-name').textContent = PRAYERS_AR[nextName] || nextName;
  document.getElementById('pr-loc').firstElementChild.textContent = `📍 ${city}`;

  startPrayerCountdown(timings[nextName]);
}

function formatTime12(h, m){
  const suffix = h >= 12 ? 'م' : 'ص';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${suffix}`;
}

let _cdTimer;
function startPrayerCountdown(timeStr){
  if (_cdTimer) clearInterval(_cdTimer);
  function tick(){
    if (!timeStr) return;
    const [h,m] = timeStr.split(':').map(Number);
    const now = new Date();
    let diff = (h*60+m)*60 - (now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds());
    if (diff < 0) diff += 86400;
    const hrs = Math.floor(diff/3600);
    const mins = Math.floor((diff%3600)/60);
    const secs = diff%60;
    document.getElementById('pr-countdown').textContent =
      `${toArabicNum(hrs)}:${toArabicNum(String(mins).padStart(2,'0'))}:${toArabicNum(String(secs).padStart(2,'0'))}`;
  }
  tick();
  _cdTimer = setInterval(tick, 1000);
}

/* ══════════════════════════════════════
   HADITH
══════════════════════════════════════ */
function renderHadith(){
  const h = HADITH[state.hdIdx];
  document.getElementById('hd-txt').textContent = h.t;
  document.getElementById('hd-narrator').textContent = h.n;
  document.getElementById('hd-src').textContent = h.s;
}

document.getElementById('hd-next').addEventListener('click', () => {
  state.hdIdx = (state.hdIdx + 1) % HADITH.length;
  renderHadith();
  toast('حديث جديد');
});

/* ══════════════════════════════════════
   PWA INSTALL
══════════════════════════════════════ */
let _installEvt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installEvt = e;
  document.getElementById('installBanner').classList.add('on');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!_installEvt) return;
  await _installEvt.prompt();
  const { outcome } = await _installEvt.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('on');
  _installEvt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('on');
  toast('تم التثبيت بنجاح 🎉');
});

/* ══════════════════════════════════════
   SHARE
══════════════════════════════════════ */
document.getElementById('shareBtn').addEventListener('click', async () => {
  if (navigator.share) {
    await navigator.share({ title:'زاد المسلم', url: location.href }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(location.href);
    toast('تم نسخ الرابط');
  }
});

document.getElementById('settingsBtn').addEventListener('click', () => toast('قريباً إن شاء الله'));

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let _toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('on'), 2500);
}

/* ══════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════ */
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('./zad-sw.js', {scope:'./'})
    .then(r => console.log('[ZadSW] registered', r.scope))
    .catch(e => console.warn('[ZadSW] failed', e));
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
buildSurahList();
azUpdate();
renderHadith();
updateMediaSession();

// Wake lock for screen (if supported)
async function requestWakeLock(){
  try {
    if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
  } catch(e){}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.playing) requestWakeLock();
});
